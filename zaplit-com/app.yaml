runtime: custom
env: flex

service: default

resources:
  cpu: 1
  memory_gb: 1
  disk_size_gb: 10

automatic_scaling:
  min_num_instances: 1
  max_num_instances: 5
  cool_down_period_sec: 60
  cpu_utilization:
    target_utilization: 0.6

env_variables:
  NODE_ENV: production
  # NOTE: All secrets loaded from GCP Secret Manager in cloudbuild.yaml
  # N8N_WEBHOOK_CONSULTATION: Loaded from Secret Manager
  # N8N_WEBHOOK_CONTACT: Loaded from Secret Manager
  # N8N_WEBHOOK_SECRET: Loaded from Secret Manager
  # TWENTY_API_KEY: Loaded from Secret Manager
  # IP_HASH_SALT: Loaded from Secret Manager
  # SENTRY_DSN: Loaded from Secret Manager
  # LOGO_DEV_TOKEN: Loaded from Secret Manager
