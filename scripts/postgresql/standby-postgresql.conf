# =============================================================================
# PostgreSQL Standby Server Configuration for n8n HA Replication
# =============================================================================
# File: /etc/postgresql/16/main/postgresql.conf
# Purpose: Standby PostgreSQL server configuration for hot standby
# Based on: PHASE2_POSTGRESQL_REPLICATION_RESEARCH.md
#
# IMPORTANT: This configuration extends the primary configuration.
# Apply primary settings first, then apply these standby-specific settings.
#
# Placeholders to replace:
#   - <primary-ip>: IP address of the primary PostgreSQL server
#   - <replicator-password>: Password for the replicator user
# =============================================================================

# =============================================================================
# INHERIT PRIMARY SETTINGS
# =============================================================================
# The standby should have the same base configuration as the primary for:
# - Connection Settings (listen_addresses, port, max_connections)
# - Memory Settings (shared_buffers, effective_cache_size, work_mem)
# - WAL Settings (wal_level, max_wal_size, etc.)
# - Checkpoint Settings
# - Query Tuning
# - Logging
# - Autovacuum
# - Statistics and Monitoring
#
# Copy the primary-postgresql.conf settings above, then apply the
# standby-specific settings below.
# =============================================================================

# -----------------------------------------------------------------------------
# Connection Settings (inherit from primary)
# -----------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3

# -----------------------------------------------------------------------------
# Memory Settings (inherit from primary)
# -----------------------------------------------------------------------------
shared_buffers = 2GB
effective_cache_size = 6GB
work_mem = 16MB
maintenance_work_mem = 512MB
huge_pages = try

# -----------------------------------------------------------------------------
# Write-Ahead Logging (WAL) - Inherit from primary
# -----------------------------------------------------------------------------
wal_level = replica
wal_log_hints = on
max_wal_size = 2GB
min_wal_size = 512MB
wal_keep_size = 1GB
wal_compression = on

# -----------------------------------------------------------------------------
# WAL Archiving (inherit from primary)
# -----------------------------------------------------------------------------
archive_mode = on
archive_command = 'gsutil cp %p gs://n8n-postgres-wal-archive/%f'
archive_timeout = 5min
restore_command = 'gsutil cp gs://n8n-postgres-wal-archive/%f %p'
recovery_target_timeline = 'latest'

# -----------------------------------------------------------------------------
# Streaming Replication Settings (inherit from primary)
# -----------------------------------------------------------------------------
max_wal_senders = 10
max_replication_slots = 5
wal_sender_timeout = 60s
hot_standby_feedback = on

# -----------------------------------------------------------------------------
# Hot Standby Settings (STANDBY-SPECIFIC)
# -----------------------------------------------------------------------------
# Enable hot standby for read-only queries on standby
hot_standby = on

# Maximum delay before canceling queries on standby when WAL needs to be applied
# Set high enough to allow long-running queries but low enough for failover readiness
max_standby_archive_delay = 60s
max_standby_streaming_delay = 30s

# -----------------------------------------------------------------------------
# WAL Receiver Settings (STANDBY-SPECIFIC)
# -----------------------------------------------------------------------------
# How often to send status updates to primary
wal_receiver_status_interval = 10s

# Timeout for WAL receiver connection
wal_receiver_timeout = 60s

# Retry interval for failed WAL retrieval
wal_retrieve_retry_interval = 5s

# -----------------------------------------------------------------------------
# Recovery Settings (CONFIGURED VIA postgresql.auto.conf AFTER pg_basebackup)
# -----------------------------------------------------------------------------
# These settings are automatically configured by pg_basebackup -R flag
# or can be manually set in postgresql.auto.conf:
#
# primary_conninfo = 'host=<primary-ip> port=5432 user=replicator password=<password> application_name=standby1 sslmode=prefer'
# primary_slot_name = 'standby1_slot'
#
# Connection string components:
#   - host: Primary server IP address
#   - port: Primary server port (5432)
#   - user: Replication user (replicator)
#   - password: Secure password for replication user
#   - application_name: Identifier for this standby in pg_stat_replication
#   - sslmode: SSL mode (disable, allow, prefer, require, verify-ca, verify-full)
#
# The standby.signal file in the data directory signals PostgreSQL to run in standby mode

# -----------------------------------------------------------------------------
# Checkpoint Settings (inherit from primary)
# -----------------------------------------------------------------------------
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9
checkpoint_flush_after = 256kB

# -----------------------------------------------------------------------------
# Query Tuning (inherit from primary)
# -----------------------------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
seq_page_cost = 1.0

# -----------------------------------------------------------------------------
# Logging (inherit from primary)
# -----------------------------------------------------------------------------
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_replication_commands = on

# -----------------------------------------------------------------------------
# Autovacuum (inherit from primary - but disabled during recovery)
# -----------------------------------------------------------------------------
# Note: Autovacuum is disabled during recovery (standby mode)
# It will automatically start when standby is promoted to primary
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_insert_threshold = 1000
autovacuum_vacuum_insert_scale_factor = 0.05

# -----------------------------------------------------------------------------
# Statistics and Monitoring (inherit from primary)
# -----------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# -----------------------------------------------------------------------------
# Read-Only Settings Reference for Applications
# -----------------------------------------------------------------------------
# When connected to standby, the database is in read-only mode by default.
# Use this query to check if connected to standby:
#   SELECT pg_is_in_recovery();
#   - Returns 't' (true) if on standby (read-only)
#   - Returns 'f' (false) if on primary (read/write)
#
# Applications should route write operations to primary and can route
# read-only queries to standby for load balancing.
# -----------------------------------------------------------------------------
