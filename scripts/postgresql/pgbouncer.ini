; =============================================================================
; PgBouncer Configuration for n8n HA PostgreSQL Setup
; =============================================================================
; File: /etc/pgbouncer/pgbouncer.ini
; Purpose: Connection pooling and failover management for n8n PostgreSQL
; Based on: PHASE2_POSTGRESQL_REPLICATION_RESEARCH.md
;
; IMPORTANT: Replace all placeholder values with actual environment settings:
;   - <primary-ip>: IP address of the primary PostgreSQL server
;   - <standby-ip>: IP address of the standby PostgreSQL server
;   - <pgbouncer-ip>: IP address of this PgBouncer server
; =============================================================================

; =============================================================================
; Database Definitions
; =============================================================================
[databases]

; Primary database for writes (always points to current primary)
; This is the main database that n8n should connect to
n8n = host=<primary-ip> port=5432 dbname=n8n

; Direct primary connection (explicit primary access)
n8n_primary = host=<primary-ip> port=5432 dbname=n8n

; Standby database for read-only queries (optional read scaling)
; Use this for reporting, analytics, or other read-only operations
n8n_standby = host=<standby-ip> port=5432 dbname=n8n

; Template database for administrative tasks
template1 = host=<primary-ip> port=5432 dbname=template1

; Administrative database
postgres = host=<primary-ip> port=5432 dbname=postgres

; =============================================================================
; PgBouncer Pooler Settings
; =============================================================================
[pgbouncer]

; -----------------------------------------------------------------------------
; Network Settings
; -----------------------------------------------------------------------------
; Port to listen on
listen_port = 6432

; Addresses to listen on (0.0.0.0 = all interfaces)
listen_addr = 0.0.0.0

; Unix socket directory (comment out if not using Unix sockets)
; unix_socket_dir = /var/run/postgresql

; Unix socket mode
; unix_socket_mode = 0777

; -----------------------------------------------------------------------------
; Authentication Settings
; -----------------------------------------------------------------------------
; Authentication type: md5, scram-sha-256, plain, trust, any, pam, hba
auth_type = scram-sha-256

; Path to user authentication file
; Format: "username" "password"
; Generate passwords with: pg_bouncer_gen_pass or use MD5 hash
auth_file = /etc/pgbouncer/userlist.txt

; HBA configuration file (if auth_type = hba)
; auth_hba_file = /etc/pgbouncer/pgbouncer_hba.conf

; Query to verify password against PostgreSQL
; auth_user = pgbouncer
; auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

; -----------------------------------------------------------------------------
; Pool Settings for n8n Workload
; -----------------------------------------------------------------------------
; Pool mode: session, transaction, or statement
; - session: Connection held until client disconnects
; - transaction: Connection held per transaction (recommended for n8n)
; - statement: Connection held per statement
pool_mode = transaction

; Default pool size per database/user pair
default_pool_size = 30

; Minimum pool size (maintains this many connections ready)
min_pool_size = 10

; Reserve pool size for emergency connections
reserve_pool_size = 5

; Timeout in seconds for clients waiting for reserve pool connection
reserve_pool_timeout = 3

; Maximum number of client connections
max_client_conn = 500

; Maximum server connections per database
max_db_connections = 100

; Maximum server connections per user
max_user_connections = 100

; -----------------------------------------------------------------------------
; Connection Settings
; -----------------------------------------------------------------------------
; How long to keep idle connections open (seconds)
server_idle_timeout = 600

; Maximum lifetime of a server connection (seconds)
server_lifetime = 3600

; Timeout for connecting to PostgreSQL (seconds)
server_connect_timeout = 15

; Retry attempts for failed server connections
server_login_retry = 3

; Delay before retrying failed connections (seconds)
server_retry_delay = 5

; Delay between attempts to connect to a failed server (seconds)
server_retry_closest = 0

; Cancel waiting queries when server connection fails
deadlock_timeout = 10

; How often to check for dead connections (seconds)
server_check_delay = 30

; Query to check server health (empty = disable)
; server_check_query = select 1

; Connection check timeout (seconds)
; server_check_timeout = 10

; DNS lookup cache time (seconds)
dns_max_ttl = 15

; DNS NXDOMAIN cache time (seconds)
dns_nxdomain_ttl = 15

; -----------------------------------------------------------------------------
; Timeout Settings
; -----------------------------------------------------------------------------
; Query timeout (seconds) - 0 = disable
query_timeout = 300

; Query wait timeout (seconds) - how long queries can wait for connection
query_wait_timeout = 120

; Client idle timeout (seconds) - 0 = disable (recommended for n8n)
client_idle_timeout = 0

; Client login timeout (seconds)
client_login_timeout = 60

; Idle transaction timeout (seconds) - 0 = disable
idle_transaction_timeout = 0

; Client connection close timeout (seconds)
client_connection_check_interval = 0

; Packet size limit (bytes)
pkt_buf = 4096

; Maximum packet size (bytes)
max_packet_size = 2147483647

; -----------------------------------------------------------------------------
; Logging Settings
; -----------------------------------------------------------------------------
; Log connections
log_connections = 1

; Log disconnections
log_disconnections = 1

; Log pooler errors
log_pooler_errors = 1

; Log statistics
log_stats = 1

; Statistics reporting period (seconds)
stats_period = 60

; Syslog settings (optional)
; syslog = 0
; syslog_facility = daemon
; syslog_ident = pgbouncer

; Verbose logging (0 = quiet, 1 = informational, 2 = debug)
verbose = 0

; -----------------------------------------------------------------------------
; Admin Console Settings
; -----------------------------------------------------------------------------
; Comma-separated list of admin users (can access console)
admin_users = postgres,pgbouncer

; Comma-separated list of stats users (can view statistics)
stats_users = prometheus,postgres

; Console access control
; console_login = 1

; -----------------------------------------------------------------------------
; TLS/SSL Settings
; -----------------------------------------------------------------------------
; Server TLS mode: disable, allow, prefer, require, verify-ca, verify-full
server_tls_sslmode = prefer

; Server CA certificate file
; server_tls_ca_file = /etc/ssl/certs/ca.crt

; Server certificate file
; server_tls_cert_file = /etc/ssl/certs/server.crt

; Server private key file
; server_tls_key_file = /etc/ssl/private/server.key

; Server TLS protocols (e.g., tlsv1.2,tlsv1.3)
; server_tls_protocols = secure

; Server TLS ciphers
; server_tls_ciphers = HIGH:!aNULL:!MD5

; Client TLS settings (for connections TO pgbouncer)
; client_tls_sslmode = disable
; client_tls_ca_file = /etc/ssl/certs/ca.crt
; client_tls_cert_file = /etc/ssl/certs/server.crt
; client_tls_key_file = /etc/ssl/private/server.key

; -----------------------------------------------------------------------------
; Failover Configuration
; -----------------------------------------------------------------------------
; Note: PgBouncer does not have built-in automatic failover.
; Failover is handled by:
; 1. Monitoring scripts that detect primary failure
; 2. Updating this configuration to point to new primary
; 3. Reloading PgBouncer configuration
;
; For simple failover, update the [databases] section:
;   n8n = host=<new-primary-ip> port=5432 dbname=n8n
;
; Then reload: sudo systemctl reload pgbouncer
;
; Alternative: Use multiple hosts with round-robin for read-only queries:
;   n8n_readonly = host=<primary-ip>,<standby-ip> port=5432,5432 dbname=n8n

; -----------------------------------------------------------------------------
; Performance Tuning
; -----------------------------------------------------------------------------
; Number of worker processes (recommend: number of CPUs)
; Default: 0 (auto-detect)
; num_workers = 0

; Maximum number of file descriptors
; max_fd = 0

; Enable TCP keepalive
; tcp_keepalive = 1

; TCP keepalive idle time (seconds)
; tcp_keepalive_idle = 7200

; TCP keepalive interval (seconds)
; tcp_keepalive_interval = 75

; TCP keepalive count
; tcp_keepalive_count = 9

; TCP user timeout (seconds)
; tcp_user_timeout = 0

; -----------------------------------------------------------------------------
; Memory Settings
; -----------------------------------------------------------------------------
; Memory buffer size for packets
;sbuf_loopcnt = 5

; Maximum size for client output buffer
; max_client_output_buffer = 0

; =============================================================================
; Peers Section (for PgBouncer cluster mode - optional)
; =============================================================================
;[peers]
; Use this section for PgBouncer clustering/federation
; peer1 = host=<peer-ip> port=6432

; =============================================================================
; Example: Complete n8n Connection String
; =============================================================================
; For n8n application, use these environment variables:
;
; N8N_DB_TYPE=postgresdb
; N8N_DB_POSTGRESDB_HOST=<pgbouncer-ip>
; N8N_DB_POSTGRESDB_PORT=6432
; N8N_DB_POSTGRESDB_DATABASE=n8n
; N8N_DB_POSTGRESDB_USER=n8n_app
; N8N_DB_POSTGRESDB_PASSWORD=<password>
;
; Connection pool settings:
; DB_POSTGRESDB_POOL_SIZE=10
; DB_POSTGRESDB_POOL_SIZE_MASTER=10
; =============================================================================
