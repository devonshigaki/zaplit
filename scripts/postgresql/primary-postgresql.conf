# =============================================================================
# PostgreSQL Primary Server Configuration for n8n HA Replication
# =============================================================================
# File: /etc/postgresql/16/main/postgresql.conf
# Purpose: Primary PostgreSQL server configuration for streaming replication
# Based on: PHASE2_POSTGRESQL_REPLICATION_RESEARCH.md
# 
# IMPORTANT: Replace placeholder values with actual environment-specific settings:
#   - <standby-ip>: IP address of the standby server
#   - <n8n-vm-ip>: IP address of the n8n application server
#   - <pgbouncer-ip>: IP address of the PgBouncer server
#   - <monitoring-ip>: IP address of the monitoring server
#   - <admin-vpc>: Admin VPC CIDR block
# =============================================================================

# -----------------------------------------------------------------------------
# Connection Settings
# -----------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3

# -----------------------------------------------------------------------------
# Memory Settings (adjust based on available RAM)
# For e2-standard-2 (2 vCPU, 8GB RAM):
# -----------------------------------------------------------------------------
shared_buffers = 2GB
effective_cache_size = 6GB
work_mem = 16MB
maintenance_work_mem = 512MB
huge_pages = try

# -----------------------------------------------------------------------------
# Write-Ahead Logging (WAL) - Replication Critical
# -----------------------------------------------------------------------------
wal_level = replica
wal_log_hints = on
max_wal_size = 2GB
min_wal_size = 512MB
wal_keep_size = 1GB
wal_compression = on

# -----------------------------------------------------------------------------
# WAL Archiving for GCS (Point-in-Time Recovery)
# -----------------------------------------------------------------------------
archive_mode = on
archive_command = 'gsutil cp %p gs://n8n-postgres-wal-archive/%f'
archive_timeout = 5min

# Recovery settings for PITR (used by standby and for recovery)
restore_command = 'gsutil cp gs://n8n-postgres-wal-archive/%f %p'
recovery_target_timeline = 'latest'

# -----------------------------------------------------------------------------
# Streaming Replication Settings
# -----------------------------------------------------------------------------
max_wal_senders = 10
max_replication_slots = 5
wal_sender_timeout = 60s

# Hot standby feedback prevents query cancellation on standby
hot_standby_feedback = on

# -----------------------------------------------------------------------------
# Checkpoint Settings
# -----------------------------------------------------------------------------
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9
checkpoint_flush_after = 256kB

# -----------------------------------------------------------------------------
# Query Tuning for n8n Workloads
# -----------------------------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
seq_page_cost = 1.0

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_replication_commands = on

# -----------------------------------------------------------------------------
# Autovacuum (Critical for n8n's high-churn tables like execution_entity)
# -----------------------------------------------------------------------------
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# Aggressive settings for n8n execution_entity table
autovacuum_vacuum_insert_threshold = 1000
autovacuum_vacuum_insert_scale_factor = 0.05

# -----------------------------------------------------------------------------
# Statistics and Monitoring
# -----------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all

# pg_stat_statements settings
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# -----------------------------------------------------------------------------
# SSL Configuration (enable for production)
# -----------------------------------------------------------------------------
# ssl = on
# ssl_cert_file = '/etc/ssl/certs/server.crt'
# ssl_key_file = '/etc/ssl/private/server.key'
# ssl_ca_file = '/etc/ssl/certs/ca.crt'

# -----------------------------------------------------------------------------
# Replication Slot Configuration Reference
# -----------------------------------------------------------------------------
# Replication slots are created via SQL after PostgreSQL starts:
# 
# CREATE ROLE replicator WITH REPLICATION LOGIN PASSWORD '<secure-password>';
# SELECT pg_create_physical_replication_slot('standby1_slot', true);
#
# Verify with:
# SELECT slot_name, slot_type, active, restart_lsn 
# FROM pg_replication_slots 
# WHERE slot_name = 'standby1_slot';
# -----------------------------------------------------------------------------
