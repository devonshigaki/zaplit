# Cloud Build Configuration for Hestia CP
# Automated deployment pipeline using GCP Cloud Build (no GitHub Actions)

steps:
  # Step 1: Validate Terraform configuration
  - name: 'hashicorp/terraform:1.7'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd gcp-deployment/hestia/terraform
        terraform init -backend=false
        terraform validate
        terraform fmt -check -recursive || echo "Formatting issues found"
    id: 'terraform-validate'

  # Step 2: Security scan with Checkov
  - name: 'bridgecrew/checkov:latest'
    args:
      - '--file=gcp-deployment/hestia/terraform/main-fixed.tf'
      - '--framework=terraform'
      - '--soft-fail'  # Don't fail build, just report
    id: 'security-scan'
    allowFailure: true

  # Step 3: Initialize Terraform with backend
  - name: 'hashicorp/terraform:1.7'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd gcp-deployment/hestia/terraform
        terraform init -input=false
    id: 'terraform-init'
    secretEnv: ['TF_VAR_project_id']

  # Step 4: Terraform Plan (on PR or non-main branches)
  - name: 'hashicorp/terraform:1.7'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd gcp-deployment/hestia/terraform
        if [ "$BRANCH_NAME" != "main" ]; then
          echo "Running terraform plan for PR/Branch: $BRANCH_NAME"
          terraform plan -input=false -out=tfplan
          terraform show -json tfplan > plan.json
        else
          echo "Skipping plan on main branch (will apply directly)"
        fi
    id: 'terraform-plan'
    secretEnv: ['TF_VAR_project_id']

  # Step 5: Terraform Apply (main branch only)
  - name: 'hashicorp/terraform:1.7'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        cd gcp-deployment/hestia/terraform
        if [ "$BRANCH_NAME" = "main" ]; then
          echo "Applying Terraform changes on main branch"
          terraform apply -auto-approve -input=false
        else
          echo "Skipping apply on non-main branch: $BRANCH_NAME"
        fi
    id: 'terraform-apply'
    secretEnv: ['TF_VAR_project_id']

  # Step 6: Post-deployment verification
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        if [ "$BRANCH_NAME" = "main" ]; then
          echo "Running post-deployment verification..."
          cd gcp-deployment/hestia/terraform
          VM_IP=$(terraform output -raw hestia_ip 2>/dev/null || echo "")
          if [ -n "$VM_IP" ]; then
            echo "Hestia VM IP: $VM_IP"
            # Wait for startup script to complete
            echo "Waiting for VM to be ready (this may take 10-15 minutes)..."
            sleep 30
            # Check if VM is reachable
            gcloud compute instances describe hestia-cp --zone=us-central1-a --format="value(status)"
          else
            echo "WARNING: Could not get VM IP from Terraform outputs"
          fi
        fi
    id: 'post-deploy-verify'

options:
  logging: CLOUD_LOGGING_ONLY
  
  # Use a longer timeout for Hestia installation
  machineType: 'E2_HIGHCPU_8'
  
  # Dynamic substitution
  substitutionOption: 'ALLOW_LOOSE'

timeout: 1800s  # 30 minutes

# Secrets from Secret Manager
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/terraform-project-id/versions/latest
      env: 'TF_VAR_project_id'

# Artifacts (Terraform plan for review)
artifacts:
  objects:
    location: 'gs://${PROJECT_ID}-cloudbuild-artifacts/terraform-plans/'
    paths:
      - 'gcp-deployment/hestia/terraform/plan.json'

# Trigger configuration (can be set up via gcloud or console)
# gcloud builds triggers create github \
#   --repo-name=zaplit \
