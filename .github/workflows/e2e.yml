name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL for tests'
        required: false
        default: 'http://localhost:3000'
      projects:
        description: 'Projects to run (comma-separated, e.g., chromium,Mobile Chrome)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # Detect changes
  changes:
    runs-on: ubuntu-latest
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
      zaplit-com: ${{ steps.filter.outputs.zaplit-com }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            e2e:
              - 'e2e/**'
              - 'playwright.config.ts'
            zaplit-com:
              - 'zaplit-com/**'
              - 'package.json'
              - 'pnpm-lock.yaml'

  # Install dependencies
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Cache node_modules
        uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: |
            node_modules
            zaplit-com/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}

  # Build application
  build:
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            zaplit-com/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
      
      - name: Build zaplit-com
        run: pnpm build:com
        env:
          NEXT_TELEMETRY_DISABLED: 1
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-com
          path: zaplit-com/.next/
          retention-days: 1

  # Run E2E tests
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [install, build]
    if: |
      always() && 
      needs.build.result == 'success'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, 'Mobile Chrome', 'Mobile Safari']
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            zaplit-com/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
      
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps ${{ matrix.project == 'chromium' && 'chromium' || '' }}
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-com
          path: zaplit-com/.next/
      
      - name: Run Playwright tests
        run: |
          if [ -n "${{ github.event.inputs.projects }}" ]; then
            pnpm exec playwright test --project="${{ github.event.inputs.projects }}"
          else
            pnpm exec playwright test --project="${{ matrix.project }}"
          fi
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:3000' }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report-${{ matrix.project }}.json
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            playwright-report/
            playwright-report-*.json
            test-results/
          retention-days: 7

  # Smoke tests (fast feedback)
  smoke-tests:
    runs-on: ubuntu-latest
    needs: [install, build]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            zaplit-com/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
      
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-com
          path: zaplit-com/.next/
      
      - name: Run smoke tests
        run: pnpm exec playwright test e2e/specs/navigation.spec.ts --project=chromium
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || 'http://localhost:3000' }}

  # E2E Summary
  e2e-summary:
    runs-on: ubuntu-latest
    needs: [e2e-tests, smoke-tests]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests (Chromium) | ${{ needs.e2e-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.smoke-tests.result }}" == "success" && \
                "${{ needs.e2e-tests.result }}" == "success" ]]; then
            echo "✅ **All E2E tests passed!**" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "❌ **Some E2E tests failed!**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  # Deploy report to GitHub Pages (optional)
  deploy-report:
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: github.ref == 'refs/heads/main' && always()
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports
          pattern: playwright-report-*
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          destination_dir: playwright-reports/${{ github.run_number }}
