# Loki Configuration - Self-Hosted (Reference)
# For Grafana Cloud, this file is not needed
# Use this if migrating from Grafana Cloud to self-hosted

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info
  http_server_read_timeout: 30s
  http_server_write_timeout: 30s
  http_server_idle_timeout: 120s

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

# Storage configuration for GCS
storage_config:
  gcs:
    bucket_name: ${GCS_BUCKET_NAME:-zaplit-loki-logs}
    # Uses workload identity or GOOGLE_APPLICATION_CREDENTIALS
  
  boltdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/cache
    cache_ttl: 24h
    shared_store: gcs

schema_config:
  configs:
    - from: 2026-01-01
      store: boltdb-shipper
      object_store: gcs
      schema: v12
      index:
        prefix: index_
        period: 24h

# Compactor for retention management
compactor:
  working_directory: /loki/compactor
  shared_store: gcs
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# Retention and limits
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h  # 7 days
  retention_period: 720h  # 30 days
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  per_stream_rate_limit: 3MB
  per_stream_rate_limit_burst: 15MB
  max_global_streams_per_user: 5000
  max_chunks_per_query: 2000000
  max_query_length: 721h
  max_query_parallelism: 32
  
chunk_store_config:
  max_look_back_period: 720h

table_manager:
  retention_deletes_enabled: true
  retention_period: 720h

query_frontend:
  compress_responses: true
  max_outstanding_per_tenant: 2048
  cache_results: true
  results_cache:
    cache:
      enable_fifocache: true
      fifocache:
        max_size_bytes: 1073741824  # 1GB
        ttl: 1h

query_scheduler:
  max_outstanding_requests_per_tenant: 2048

tracing:
  enabled: true

analytics:
  reporting_enabled: false
