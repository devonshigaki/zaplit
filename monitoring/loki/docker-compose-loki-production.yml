# Docker Compose for Loki Log Aggregation Stack (Production)
# 
# This compose file adds Promtail to the existing monitoring stack
# and includes optional self-hosted Loki configuration
#
# Usage:
#   export $(cat .env.loki | xargs)
#   docker-compose -f docker-compose-loki-production.yml up -d
#
# Prerequisites:
#   - Docker and Docker Compose installed
#   - Existing docker network 'monitoring' (or create with: docker network create monitoring)
#   - Environment variables in .env.loki file or exported
#   - Log directories mounted and accessible

version: '3.8'

services:
  # ============================================
  # Loki - Log Aggregation Server (Self-hosted)
  # ============================================
  # Uncomment this section if running self-hosted Loki
  # For Grafana Cloud Loki, keep this commented and configure Promtail only
  #
  # loki:
  #   image: grafana/loki:2.9.4
  #   container_name: loki
  #   ports:
  #     - "3100:3100"
  #   volumes:
  #     - ./config/loki-selfhosted.yml:/etc/loki/local-config.yaml:ro
  #     - loki-data:/loki
  #   command: -config.file=/etc/loki/local-config.yaml
  #   restart: unless-stopped
  #   networks:
  #     - monitoring
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 10s
  #   logging:
  #     driver: json-file
  #     options:
  #       max-size: "10m"
  #       max-file: "3"
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '1.0'
  #         memory: 1G
  #       reservations:
  #         cpus: '0.5'
  #         memory: 256M

  # ============================================
  # Promtail - Log Shipper
  # ============================================
  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    volumes:
      # Configuration
      - ./promtail-production.yml:/etc/promtail/config.yml:ro
      
      # Host logs to scrape
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      
      # Promtail state (positions file)
      - promtail-data:/var/lib/promtail
      
      # Machine ID for journald
      - /etc/machine-id:/etc/machine-id:ro
      
      # Journald access (for systemd journal scraping)
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/localtime:/etc/localtime:ro
    
    command: 
      - -config.file=/etc/promtail/config.yml
      - -config.expand-env=true
      - -log.level=info
    
    restart: unless-stopped
    
    networks:
      - monitoring
    
    environment:
      # Grafana Cloud Loki credentials
      - GRAFANA_CLOUD_LOKI_HOST=${GRAFANA_CLOUD_LOKI_HOST}
      - GRAFANA_CLOUD_LOKI_USER=${GRAFANA_CLOUD_LOKI_USER}
      - GRAFANA_CLOUD_API_KEY=${GRAFANA_CLOUD_API_KEY}
    
    # Required for journald scraping
    privileged: true
    
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9080/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,job"
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    
    # Security options
    security_opt:
      - no-new-privileges:true
    
    read_only: true
    
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

  # ============================================
  # Logrotate Sidecar (optional)
  # ============================================
  # Handles log rotation for Promtail's own logs
  # and can be configured to manage application logs
  logrotate:
    image: blacklabelops/logrotate:1.3
    container_name: logrotate
    environment:
      - LOGS_DIRECTORIES=/var/log/promtail
      - LOGROTATE_INTERVAL=daily
      - LOGROTATE_COPIES=7
      - LOGROTATE_SIZE=100M
      - LOGROTATE_COMPRESSION=compress
    volumes:
      - promtail-logs:/var/log/promtail
      - /var/log:/host/var/log:ro
    restart: unless-stopped
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M

  # ============================================
  # Node Exporter (for metrics correlation)
  # ============================================
  # Include if not already running in your stack
  # node-exporter:
  #   image: prom/node-exporter:v1.7.0
  #   container_name: node-exporter
  #   volumes:
  #     - /proc:/host/proc:ro
  #     - /sys:/host/sys:ro
  #     - /:/rootfs:ro
  #   command:
  #     - '--path.procfs=/host/proc'
  #     - '--path.rootfs=/rootfs'
  #     - '--path.sysfs=/host/sys'
  #     - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
  #   restart: unless-stopped
  #   networks:
  #     - monitoring
  #   logging:
  #     driver: json-file
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

volumes:
  # Loki data (for self-hosted mode)
  # loki-data:
  
  # Promtail state
  promtail-data:
  
  # Promtail logs
  promtail-logs:
  
  # Grafana data (for self-hosted mode)
  # grafana-data:

networks:
  monitoring:
    external: true
    # If network doesn't exist, remove 'external: true' and uncomment:
    # driver: bridge
