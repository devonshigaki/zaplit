runtime: python311

handlers:
  # Serve static files
  - url: /_next/static
    static_dir: dist/_next/static
    secure: always

  - url: /(.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json|xml|txt|webmanifest))$
    static_files: dist/\1
    upload: dist/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json|xml|txt|webmanifest)$
    secure: always

  # Serve HTML files for routes
  - url: /about
    static_files: dist/about.html
    upload: dist/about.html
    secure: always

  - url: /contact
    static_files: dist/contact.html
    upload: dist/contact.html
    secure: always

  - url: /blog
    static_files: dist/blog.html
    upload: dist/blog.html
    secure: always

  - url: /careers
    static_files: dist/careers.html
    upload: dist/careers.html
    secure: always

  - url: /integrations
    static_files: dist/integrations.html
    upload: dist/integrations.html
    secure: always

  - url: /privacy
    static_files: dist/privacy.html
    upload: dist/privacy.html
    secure: always

  - url: /terms
    static_files: dist/terms.html
    upload: dist/terms.html
    secure: always

  - url: /blog/introducing-zaplit
    static_files: dist/blog/introducing-zaplit.html
    upload: dist/blog/introducing-zaplit.html
    secure: always

  - url: /blog/security-first-design
    static_files: dist/blog/security-first-design.html
    upload: dist/blog/security-first-design.html
    secure: always

  - url: /blog/human-in-the-loop
    static_files: dist/blog/human-in-the-loop.html
    upload: dist/blog/human-in-the-loop.html
    secure: always

  - url: /blog/building-with-agents
    static_files: dist/blog/building-with-agents.html
    upload: dist/blog/building-with-agents.html
    secure: always

  # Root path
  - url: /
    static_files: dist/index.html
    upload: dist/index.html
    secure: always

  # Catch all for 404
  - url: /.*
    static_files: dist/404.html
    upload: dist/404.html
    secure: always
